<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/affiliate-disclosure/' | relative_url }}">Disclosure</a>
        <a href="{{ '/reviews/' | relative_url }}">Reviews</a>
        <a href="{{ '/contact/' | relative_url }}">Contact</a>
        <a href="{{ '/impact-verify/' | relative_url }}">Impact Verify</a>
      </nav>
    </div>
  </header>
  <main class="wrap content">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="wrap">
      <p><strong>Affiliate disclosure:</strong> some links may be affiliate links. We keep editorial judgment independent.</p>
      <p><a href="{{ '/affiliate-disclosure/' | relative_url }}">Full disclosure</a> · <a href="{{ '/privacy/' | relative_url }}">Privacy</a> · <a href="{{ '/contact/' | relative_url }}">Contact</a> · <a href="{{ '/impact-verify/' | relative_url }}">Impact verification</a></p>
    </div>
  </footer>
</body>
</html>
